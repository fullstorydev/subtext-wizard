name: Release

on:
  push:
    branches: [main]

concurrency: ${{ github.workflow }}-${{ github.ref }}

permissions:
  contents: read

jobs:
  # Maintains the rolling "Version Packages" PR. Runs on every push to main;
  # when no changesets are pending it does nothing. Never publishes.
  version:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    steps:
      # Actions are pinned to full commit SHAs (not mutable tags) to defend
      # against tag-jacking. Trailing comment records the human-readable tag.
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          persist-credentials: false

      - uses: actions/setup-node@39370e3970a6d050c480ffad4ff0ed4d3fdee5af # v4.1.0
        with:
          node-version: "24"

      - name: Install dependencies
        # --ignore-scripts guarantees no dependency lifecycle script runs in
        # CI, even if the tree gains one in future.
        run: npm ci --ignore-scripts

      - uses: changesets/action@a45c4d594aa4e2c509dc14a9f2b3b67ba3780d0d # v1.9.0
        with:
          version: npm run version-packages
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # Publishes to npm. Only runs on the merge of a "Version Packages" PR, and
  # is gated on the `release` environment so a merge alone can't publish —
  # configure required reviewers on it in repo Settings → Environments.
  publish:
    runs-on: ubuntu-latest
    if: contains(github.event.head_commit.message, 'Version Packages') || contains(github.event.head_commit.message, 'changeset-release/main')
    environment: release
    permissions:
      # contents: write lets the changesets action push release tags and
      # create GitHub Releases; id-token: write enables npm trusted
      # publishing (OIDC), so no npm token secret is needed.
      contents: write
      id-token: write
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          persist-credentials: false

      - uses: actions/setup-node@39370e3970a6d050c480ffad4ff0ed4d3fdee5af # v4.1.0
        with:
          node-version: "24"
          registry-url: "https://registry.npmjs.org"

      - name: Install dependencies
        # --ignore-scripts guarantees no dependency lifecycle script runs in
        # CI, even if the tree gains one in future.
        run: npm ci --ignore-scripts

      - name: Audit dependencies
        # Block the release on any known advisory in the pinned tree.
        run: npm audit --audit-level=moderate

      - name: Build
        run: npm run build

      - name: Publish npm package
        # `changeset publish` runs `npm publish` under the hood, with access
        # set via .changeset/config.json + publishConfig. NO --provenance:
        # npm rejects provenance attestations from private source repos
        # (E422 "Unsupported ... visibility: private"). This repo is private,
        # so provenance was intentionally dropped in 059d114.
        uses: changesets/action@a45c4d594aa4e2c509dc14a9f2b3b67ba3780d0d # v1.9.0
        with:
          publish: npm run release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
