name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: read
  id-token: write

jobs:
  release:
    runs-on: ubuntu-latest
    # Publishing is gated on the `release` environment so a tag push alone
    # can't publish — configure required reviewers/branch rules on it in
    # repo Settings → Environments.
    environment: release
    steps:
      # Actions are pinned to full commit SHAs (not mutable tags) to defend
      # against tag-jacking. Trailing comment records the human-readable tag.
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          persist-credentials: false

      - uses: actions/setup-node@39370e3970a6d050c480ffad4ff0ed4d3fdee5af # v4.1.0
        with:
          node-version: "24"
          registry-url: "https://registry.npmjs.org"

      - name: Validate npm version matches tag
        run: |
          TAG_VERSION="${GITHUB_REF_NAME#v}"
          PKG_VERSION=$(node -p "require('./package.json').version")
          if [ "$TAG_VERSION" != "$PKG_VERSION" ]; then
            echo "Tag version ($TAG_VERSION) does not match package.json version ($PKG_VERSION)"
            exit 1
          fi

      - name: Install dependencies
        # --ignore-scripts guarantees no dependency lifecycle script runs in
        # CI, even if the tree gains one in future.
        run: npm ci --ignore-scripts

      - name: Audit dependencies
        # Block the release on any known advisory in the pinned tree.
        run: npm audit --audit-level=moderate

      - name: Build
        run: npm run build

      - name: Publish npm package
        # --provenance is automatic under trusted publishing, but explicit is
        # self-documenting.
        run: npm publish --access public --provenance
