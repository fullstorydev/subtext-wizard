name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: read
  id-token: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false

      - uses: actions/setup-node@v4
        with:
          node-version: "24"
          registry-url: "https://registry.npmjs.org"

      - name: Validate npm version matches tag
        run: |
          TAG_VERSION="${GITHUB_REF_NAME#v}"
          PKG_VERSION=$(node -p "require('./package.json').version")
          if [ "$TAG_VERSION" != "$PKG_VERSION" ]; then
            echo "Tag version ($TAG_VERSION) does not match package.json version ($PKG_VERSION)"
            exit 1
          fi

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Publish npm package
        run: npm publish --access public
        env:
          # TEMPORARY: bootstrap token for the very first publish, before the package
          # exists on npm and trusted publishing (OIDC) can be configured. Once trusted
          # publishing is set up on npmjs.com, delete this env block and the NPM_TOKEN
          # secret — subsequent releases authenticate tokenlessly via id-token: write.
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
